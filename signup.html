<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | MedCare Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="site-header" id="siteHeader">
  <div class="container header-inner">
    <a href="index.html" class="logo">
    <img src="./images/logo.jpeg" alt="logo" class="img" >
      <span class="logo-text">MedCare<small>HOSPITAL</small></span>
    </a>

    <nav class="main-nav" id="mainNav">
      <a href="./index.html">Home</a>
      <a href="./index.html#about">About</a>
      <a href="./index.html#services">Services</a>
      <a href="./index.html#doctors">Doctors</a>
      <a href="./contact.html">Contact</a>
    </nav>

    <div class="header-actions">
      <a href="./login.html" class="btn btn-outline">log In</a>
      <a href="./index.html#contact" class="btn btn-primary">Book Appointment</a>
    </div>

    <button type="button" class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="mainNav">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
<section class="login-page py-4">
    <div class="container-fluid px-5">
        <div class="row align-items-stretch min-vh-100">
            <div class="col-lg-7 text-center mb-4 mb-lg-0 left">
                <img src="./images/doctors.png"
                    class="img-fluid doctor"
                    alt="Doctor">
            </div>
            <div class="col-lg-5">
                <div class="card border-0 shadow rounded-4 p-4 login-card">
                    <h2 class="fw-bold text-center welcome-title">
                        Create Your Account
                    </h2>
                    <p class="text-center text-secondary mb-4">
                        JOIN MEDCARE HOSPITAL TODAY
                    </p>
                    <form id="signupForm">
                        <div class="mb-3">
                            <label class="form-label">
                                Full Name
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person-vcard"></i>
                                </span>
                                <input type="text" class="form-control" id="fullname" placeholder="Enter your full name">
                            </div>
                            <small id="fullnameError"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                Username
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person-fill"></i>
                                </span>
                                <input type="text" class="form-control" id="username" placeholder="Enter your Username">
                            </div>
                            <small id="userError"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                Email
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-envelope-fill"></i>
                                </span>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email">
                            </div>
                            <small id="emailError"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                Password
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>
                                    <input type="password" class="form-control" id="password" placeholder="Enter your Password">
                            </div>
                            <small id="passError"></small>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">
                                Confirm Password
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>
                                    <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter your Password">
                            </div>
                            <small id="confirmError"></small>
                        </div>
                        <button type="submit" class="btn btn-login text-white w-100 rounded-3 mb-3">
                            <span>Create Account</span>
                        </button>
                        <p class="text-center text-secondary mb-0">
                            Already have an account?
                            <a href="./login.html" class="text-decoration-none fw-semibold">Log In</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="./js/main.js"></script>
<script src="./js/signup.js"></script>

<div class="success-modal" id="successModal">
    <div class="modal-content">
        <div class="check-circle">
            <i class="bi bi-check-lg"></i>
        </div>
        <h2>Account Created!</h2>
        <p>Welcome to MedCare — please log in to continue</p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>
</body>
</html>
